name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Flutter ${{ matrix.channel }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        channel: [stable, beta]

    steps:
      - uses: actions/checkout@v4

      # Flutter includes Dart. Using flutter-action so that dart pub get can
      # also resolve ./example/ (a Flutter app) without failing on missing
      # flutter_test SDK dependency.
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.channel }}

      - name: Install dependencies
        run: dart pub get

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Test
        run: dart test

      - name: Publish dry-run (stable only)
        if: matrix.channel == 'stable'
        run: dart pub publish --dry-run
